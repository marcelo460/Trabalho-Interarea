<!DOCTYPE html> 

<html lang="pt-br">
    
    <head>
        <!-- Definindo os arquivos que vou usar neste html. -->
        <link rel="stylesheet" href="Index_recursos/visual.css">
        <script src="Index_recuros/java.js"></script>

        <!-- Vinculando o arquivo externo -->
        <script src="script.js"></script>
        <link rel="stylesheet" href="style.css">
        
        <!-- Titulo da pagina no google -->
         <title>Galeria do Museu Virtual</title>
    
    </head>

    <body>
        <!-- Cabeçalho do Museu -->
        <header class="cabecalho">
            <h1>Museu Digital de Camaçari</h1>
            <p>Compreenda o mundo ao seu redor com uma pesperctiva diferente</p>
        </header>

        <!-- Container Principal a destoancia do background -->
        <main class="galeria">

            <!-- Obra 1 -->
            <article class="card-img">
                <!-- Moldura(class="") e Imagem(src="") -->
                <div class="moldura">
                    <img src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=600"
                     alt="N/A" class="art-image">
                </div>
                <!-- Identificação (Formatada embaixo) -->
                <div class="informacoes">
                    <h2 class="art-name">Flores da Primavera</h2>
                    <p class="artista">Desconhecido, c. 2021</p>
                    <p class="localizxacao">Casa de Ginaldo</p>
                </div>
            </article>

        </main>
    </body>
</html>
