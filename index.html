<!DOCTYPE html> 
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Definindo os arquivos que vai usar (Centralizados na sua pasta de recursos) -->
    <link rel="stylesheet" href="Index_recursos/visual.css">
    <script src="Index_recursos/java.js" defer></script>

    <!-- Titulo da pagina -->
    <title>Galeria do Museu Virtual</title>
</head>
<body>

    <!-- HOTBAR: Barra de Navegação Superior Fixa -->
    <nav class="hotbar">
        <div class="nav-container">
            <!-- Nome do museu no cantinho esquerdo -->
            <div class="nav-logo">Museu de Camaçari</div>
            <!-- Opções para navegar em diferentes partes do site -->
            <ul class="nav-links">
                <li><a href="https://marcelo460.github.io/Trabalho-Interarea/">Início</a></li>
                <li><a href="#galeria">Exposições</a></li>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Mais</a></li>
            </ul>
        </div>
    </nav>

    <!-- Cabeçalho do Museu (Ajustado para não sumir embaixo da hotbar) -->
    <header id="inicio" class="cabecalho">
        <h1>Museu Digital de Camaçari</h1>
        <p>Compreenda o mundo ao seu redor com uma perspectiva diferente.</p>
    </header>

    <!-- Container Principal -->
    <main id="galeria" class="galeria">

        <!-- Obra -->
        <article class="card-img">
            <!-- Moldura e Imagem -->
            <div class="moldura">
                <img src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=600"
                 alt="Imagem teste" class="art-image">
            </div>
            <!-- Identificação -->
            <div class="informacoes">
                <h2 class="art-name">Flores da Primavera</h2>
                <p class="artista">Desconhecido, c. 2021</p>
                <p class="localizacao">Casa de Ginaldo</p>
            </div>
        </article>

        <!-- Obra -->
        <article class="card-img">
            <!-- Moldura e Imagem -->
            <div class="moldura">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Mona_Lisa.jpg/500px-Mona_Lisa.jpg"
                 alt="Imagem teste2" class="art-image">
            </div>
            <!-- Identificação -->
            <div class="informacoes">
                <h2 class="art-name">Mona Lisa</h2>
                <p class="artista">Foi Eu</p>
                <p class="localizacao">Museu do Louvre, Paris, França</p>
            </div>
        </article>

    </main>

</body>
</html>
